networks:
  smart-city-net:
    driver: bridge

services:
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: traffic_data
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - smart-city-net

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      - CLUSTER_NAME=test-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "9870:9870"
    volumes:
      - ./data/hdfs/namenode:/hadoop/dfs/name
    networks:
      - smart-city-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    depends_on:
      - namenode
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - ./data/hdfs/datanode:/hadoop/dfs/data
    networks:
      - smart-city-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: zookeeper

    ports:
      - "2181:2181"

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

    networks:
      - smart-city-net


  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"
      - "9093:9093"

    volumes:
      - kafka-data:/var/lib/kafka/data

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093

      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      KAFKA_CREATE_TOPICS: "telemetry_topic:1:1,incidents_topic:1:1,streets_topic:1:1"

    networks:
      - smart-city-net


  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: smart-city-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    depends_on:
      - kafka

    networks:
      - smart-city-net
  


  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    volumes:
      - ./notebooks:/home/jovyan/work
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8080"
    networks:
      - smart-city-net

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    volumes:
      - ./notebooks:/home/jovyan/work
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on: [spark-master]
    networks:
      - smart-city-net

  jupyter-lab:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: jupyter-lab
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./jars:/home/jovyan/jars
    environment:
      - JUPYTER_TOKEN=spark_project
    command:
      - /bin/bash
      - -lc
      - |
        pip install clickhouse-connect &&
        start-notebook.sh --NotebookApp.token='spark_project'
    networks:
      - smart-city-net

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - smart-city-net
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=default

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ./data/grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - smart-city-net

volumes:
  clickhouse_data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
